
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Dey | Designer & Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <style>
        :root {
          --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        html {
          scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #fafafa;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        .font-modern {
            font-family: 'Satoshi', sans-serif;
            letter-spacing: -0.03em;
        }

        ::selection {
            background: #ffffff;
            color: #000000;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #222222;
        }

        /* Page Transitions */
        .page-fade-enter {
          animation: fade-in 1.2s var(--ease-out-expo) forwards;
        }

        @keyframes fade-in {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes grain {
          0%, 100% { transform:translate(0, 0) }
          10% { transform:translate(-5%, -10%) }
          20% { transform:translate(-15%, 5%) }
          30% { transform:translate(7%, -25%) }
          40% { transform:translate(-5%, 25%) }
          50% { transform:translate(-15%, 10%) }
          60% { transform:translate(15%, 0%) }
          70% { transform:translate(0%, 15%) }
          80% { transform:translate(3%, 35%) }
          90% { transform:translate(-10%, 10%) }
        }

        .bg-grain::after {
          content: "";
          position: fixed;
          top: -100%;
          left: -100%;
          width: 300%;
          height: 300%;
          background-image: url("https://grainy-gradients.vercel.app/noise.svg");
          opacity: 0.04;
          pointer-events: none;
          z-index: 999;
          animation: grain 8s steps(10) infinite;
        }

        @keyframes slow-rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        .animate-slow-rotate {
          animation: slow-rotate 25s linear infinite;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0) rotate(0); }
          50% { transform: translateY(-10px) rotate(5deg); }
        }

        .animate-float {
          animation: float 6s ease-in-out infinite;
        }

        /* Professional Boutique Cursor */
        #custom-cursor {
          position: fixed;
          top: 0;
          left: 0;
          width: 6px;
          height: 6px;
          background: white;
          border-radius: 50%;
          pointer-events: none;
          z-index: 10001;
          mix-blend-mode: difference;
          will-change: transform;
        }

        #cursor-follower {
          position: fixed;
          top: 0;
          left: 0;
          width: 30px;
          height: 30px;
          border: 1px solid rgba(255, 255, 255, 0.3);
          border-radius: 50%;
          pointer-events: none;
          z-index: 10000;
          transition: transform 0.1s var(--ease-out-expo), width 0.3s var(--ease-out-expo), height 0.3s var(--ease-out-expo), opacity 0.3s;
          will-change: transform;
        }

        .cursor-hover {
          width: 60px !important;
          height: 60px !important;
          background: rgba(255, 255, 255, 0.1);
          border-color: rgba(255, 255, 255, 0.6) !important;
        }

        @media (max-width: 1024px) {
          body { cursor: auto; }
          #custom-cursor, #cursor-follower { display: none; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased bg-grain">
    <div id="root"></div>
    <div id="custom-cursor"></div>
    <div id="cursor-follower"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
